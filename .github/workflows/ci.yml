name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-macos:
    name: Test (macOS)
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Build and Test
        run: swift test --configuration debug

  test-ios:
    name: Test (iOS Simulator)
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Build and Test
        run: |
          xcodebuild test \
            -scheme AppStoreReviewPrompt \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest'
